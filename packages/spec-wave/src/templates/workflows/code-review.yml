name: Code Review

on:
  pull_request:
    types: [opened, reopened]

concurrency:
  group: spec-wave-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Move Feature to Code Review
        run: npx @spec-wave/cli code-review --pr-number ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
